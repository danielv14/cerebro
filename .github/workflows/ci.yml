name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # No standalone linter: the project keeps deps to types-only, so strict
      # `tsc` is the lint/strictness gate. typecheck + test + a compile build.
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
